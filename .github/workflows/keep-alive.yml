name: Empty Commit Push

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:        # allows manual trigger

jobs:
  push-empty-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "atisor73"
          git config user.email "rosita.fu99@gmail.com"

      - name: Create empty commit
        run: |
          git commit --amend --allow-empty -m "Trigger workflow: empty commit"

      - name: Push changes
        run: git push


